<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Notes Forge</title>
<link rel="icon" type="image/x-icon" href="favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link id="hljsLightTheme" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github.min.css">
<link id="hljsDarkTheme" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/styles/github-dark.min.css" disabled>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.8.0/highlight.min.js"></script>

<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            packages: { '[+]': ['ams'] }
        },
        chtml: {
            displayAlign: 'left',
            displayIndent: '0',
            linebreaks: {
                automatic: true,
                width: 'container'
            }
        },
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        }
    };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
